name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least-privilege default token for all jobs (CodeQL: missing-workflow-permissions).
# Jobs that need more (e.g. coverage publishing) declare their own permissions block.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25.x'
      - name: Verify Go installation
        run: |
          echo "Go version:"
          go version
          echo "Go environment:"
          go env GOPATH
          go env GOROOT
      - name: golangci-lint
        run: go tool golangci-lint run --config .golangci.yml --timeout=5m

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25.x'
      - name: Verify tools
        run: |
          echo "Checking required tools:"
          echo "- gofmt: $(which gofmt)"
          echo "- find: $(which find)"
          echo "- grep: $(which grep)"
          echo "- sed: $(which sed)"
          echo "All tools are available ✓"
      - name: Check formatting
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files need formatting:"
            echo "$unformatted"
            echo "Run 'gofmt -s -w .' or 'make fmt' to fix"
            exit 1
          fi
      - name: Check trailing whitespaces
        run: |
          files_with_whitespace=$(find . -type f \( -name "*.go" -o -name "*.md" -o -name "*.yml" -o -name "*.yaml" -o -name "*.json" -o -name "*.sh" -o -name "Makefile" -o -name "Dockerfile" \) ! -path "./vendor/*" ! -path "./.git/*" ! -path "./.github/*" -exec grep -l '[[:space:]]$' {} + 2>/dev/null || true)
          if [ -n "$files_with_whitespace" ]; then
            echo "❌ The following files have trailing whitespaces:"
            echo "$files_with_whitespace"
            echo "Run 'make trim-whitespace' to fix"
            exit 1
          fi
          echo "✅ No trailing whitespaces found"
      - name: Check go mod tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "go mod tidy made changes - please run 'go mod tidy' and commit the changes"
            git diff go.mod go.sum
            exit 1
          fi

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25.x'
      - name: Run go vet
        run: go vet ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, format, vet]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25.x'
      - name: Build
        run: |
          go build -v ./...
          go build -o bin/api ./cmd/api

  test:
    runs-on: ubuntu-latest
    needs: [lint, format, vet]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25.x'
      - name: Go env
        run: |
          go env
          go version
      - name: Download deps
        run: GOPROXY=direct GOSUMDB=off go mod download
      - name: Test with coverage
        run: |
          GOPROXY=direct GOSUMDB=off go test ./... -coverpkg=./... -coverprofile=coverage.out -count=1
          go tool cover -func=coverage.out | tail -n 1
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: coverage.out
      - name: Upload to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: false
        if: ${{ always() }}
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=devops-thiago_otel-example-go
            -Dsonar.organization=devops-thiago
            -Dsonar.go.coverage.reportPaths=coverage.out
        if: ${{ env.SONAR_TOKEN != '' }}

  docker-build:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Docker image for PR validation
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          tags: otel-example-go:pr-${{ github.event.pull_request.number }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image was built
        run: |
          echo "Listing Docker images:"
          docker images
          echo "Checking if our image exists:"
          docker inspect otel-example-go:pr-${{ github.event.pull_request.number }}


